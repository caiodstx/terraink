    <!-- Consent Mode v2 — must load before GA4 and AdSense -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      // Default for the rest of the world: granted (no consent banner is
      // shown outside regulated regions, so denying here would block GA/ads
      // permanently for those visitors).
      gtag("consent", "default", {
        ad_storage: "granted",
        ad_user_data: "granted",
        ad_personalization: "granted",
        analytics_storage: "granted",
      });

      // Stricter default for regulated regions (EEA + UK + Switzerland):
      // denied until the user grants consent via the CMP banner. The
      // region-scoped default takes precedence for these countries.
      gtag("consent", "default", {
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        analytics_storage: "denied",
        wait_for_update: 500,
        region: [
          "AT",
          "BE",
          "BG",
          "HR",
          "CY",
          "CZ",
          "DK",
          "EE",
          "FI",
          "FR",
          "DE",
          "GR",

          "SK",
          "SI",
          "ES",
          "SE",
          "IS",
          "LI",
          "NO",
          "GB",
          "CH",
        ],
      });
    </script>
