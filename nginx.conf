server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), payment=()" always;

  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Service-Worker-Allowed "/";
    try_files $uri =404;
  }

  location = /site.webmanifest {
    add_header Cache-Control "no-cache";
    add_header Content-Type "application/manifest+json";
    try_files $uri =404;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Static per-city SEO pages (public/mapa/<slug>/index.html, regenerated
  # on every build — no content hash in the URL like /assets/, so no
  # immutable/1y caching here). 1h lets Cloudflare's edge cache serve
  # repeat crawler/visitor hits without hammering origin, while still
  # picking up copy/price edits within the hour.
  location /mapa/ {
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    try_files $uri $uri/ =404;
  }

  # "/" gets the real pre-rendered landing HTML (dist/index.html — see
  # scripts/prerender-landing.mjs). Exact match (=) beats the generic
  # prefix location below regardless of declaration order, so this is the
  # only path that serves it.
  location = / {
    try_files /index.html =404;
  }

  # Every other unmatched route (/crear, /pedido/gracias, /pedido/cancelado,
  # ...) gets the empty SPA shell instead — critically, this is what Stripe
  # redirects to after checkout, so it must never see the landing markup.
  location / {
    try_files $uri $uri/ /app-shell.html;
  }
}
