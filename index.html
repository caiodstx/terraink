<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- SVG for modern browsers, sized PNGs for fallback, apple-touch-icon for iOS -->
    <!-- Real /favicon.ico too: Google and older browsers check that path
         by convention independent of the <link> tags below — without a
         real file there, it fell through to the SPA's index.html
         (text/html, not an icon), so crawlers showed a generic icon. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Mapagrama: Pósters de mapas personalizados</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Diseña tu propio póster de mapa de cualquier ciudad — elige colores, calles y texto, e imprímelo y envíalo a casa listo para enmarcar. Producción en España."
    />
    <meta
      name="keywords"
      content="póster de mapa personalizado, mapa de ciudad para imprimir, regalo mapa personalizado, cuadro de mapa, póster mapa España, mapa OpenStreetMap"
    />
    <meta name="robots" content="index, follow" />
    <meta
      name="google-site-verification"
      content="%VITE_GOOGLE_SITE_VERIFICATION%"
    />
    <meta name="p:domain_verify" content="d2655b09f9fe59e743e9f901d308033c" />
    <meta name="author" content="Mapagrama" />
    <meta name="copyright" content="Mapagrama" />
    <link rel="canonical" href="https://mapagrama.com" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#0a1824" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Mapagrama" />
    <meta name="msapplication-TileColor" content="#0a1824" />
    <link rel="mask-icon" href="/assets/logo.svg" color="#0a1824" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mapagrama" />
    <meta
      property="og:title"
      content="Mapagrama: Pósters de mapas personalizados"
    />
    <meta
      property="og:description"
      content="Diseña tu propio póster de mapa de cualquier ciudad — elige colores, calles y texto, e imprímelo y envíalo a casa listo para enmarcar. Producción en España."
    />
    <meta property="og:url" content="https://mapagrama.com" />
    <meta
      property="og:image"
      content="https://mapagrama.com/assets/banner.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Mapagrama — pósters de mapas personalizados"
    />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Mapagrama: Pósters de mapas personalizados"
    />
    <meta
      name="twitter:description"
      content="Diseña tu propio póster de mapa de cualquier ciudad — elige colores, calles y texto, e imprímelo y envíalo a casa listo para enmarcar. Producción en España."
    />
    <meta
      name="twitter:image"
      content="https://mapagrama.com/assets/banner.jpg"
    />
    <meta
      name="twitter:image:alt"
      content="Mapagrama — pósters de mapas personalizados"
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Mapagrama",
        "alternateName": [
          "Mapagrama — Creador de pósters de mapas personalizados"
        ],
        "url": "https://mapagrama.com",
        "description": "Diseña tu propio póster de mapa de cualquier ciudad — elige colores, calles y texto, e imprímelo y envíalo a casa listo para enmarcar.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern web browser",
        "screenshot": "https://mapagrama.com/assets/banner.jpg",
        "featureList": [
          "Creador de pósters de mapa personalizados para cualquier ciudad",
          "Exportación en alta resolución lista para imprenta",
          "Datos de OpenStreetMap",
          "Docenas de temas de mapa seleccionados",
          "Paletas de color personalizadas",
          "Control tipográfico con Google Fonts",
          "Producción e impresión bajo demanda"
        ],
        "keywords": "póster de mapa personalizado, mapa de ciudad para imprimir, regalo mapa personalizado, cuadro de mapa",
        "creator": {
          "@type": "Organization",
          "name": "Mapagrama",
          "url": "https://mapagrama.com"
        }
      }
    </script>
    <!-- Analytics: Cloudflare Web Analytics + Zaraz (funnel events), both
         injected automatically at the Cloudflare edge when enabled for the
         zone — no script tag needed here. Replaces an inert GA4 wrapper
         (gtag.js + Consent Mode v2) that shipped from the original fork but
         was never actually activated (no real measurement ID was ever set)
         — removed rather than left dead, and its cookie-consent-banner
         requirement avoided entirely by choosing cookieless tooling. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
